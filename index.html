<!doctype html>
<html>
<body>
  <h1>PW Web</h1>
  <pre id="out">Loading...</pre>
  <script>
    fetch('/api/getbatches')
      .then(r => r.json())
      .then(d => {
        document.getElementById('out').textContent = JSON.stringify(d, null, 2);
      })
      .catch(e => {
        document.getElementById('out').textContent = e.message;
      });
  </script>
</body>
</html>
